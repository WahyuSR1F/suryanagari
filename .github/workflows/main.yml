name: Deploy to Vercel via Hook
on:
  push:
    branches:
      - main  # Ganti 'main' jika branch utama Anda bernama lain (misal 'master')

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          curl -X POST https://api.vercel.com/v1/integrations/deploy/prj_eWKQEkAkw4kKsz5h7ibngcGilo3N/a5DvTQipWi
